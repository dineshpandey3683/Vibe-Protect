# ---------------------------------------------------------------------------
# Drop this file into your own repo as `.github/workflows/secrets-scan.yml`
# to fail any pull-request that would introduce a secret.
#
# Two modes are shown:
#   a) `docker://` — pull the pre-built image from Docker Hub (fastest).
#   b) `pip install` — slower cold start, but works without a Docker
#                      registry pull and uses the exact same CLI.
# ---------------------------------------------------------------------------

name: Secret scan

# NOTE — DISABLED for auto-run in this repository.
#
# This workflow is a **reference** for people who install `vibe-protect`
# in their OWN project. It does not auto-run here because our repo
# contains deliberate synthetic secrets in backend/tests/ that the
# detector is *supposed* to match — running the scanner against our own
# fixtures produces 100% false-positive noise.
#
# To enable in your project: copy this file into
# `.github/workflows/secrets-scan.yml` and change `workflow_dispatch`
# below back to `push:` / `pull_request:`.

on:
  workflow_dispatch:

jobs:
  # ---------------------------- a) Docker-based -----------------------------
  scan-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan every staged file with Vibe Protect (pre-commit mode)
        uses: docker://vibeprotect/vibe-protect:latest
        with:
          # Override the image default (which scans stdin). Here we re-use
          # the --pre-commit scanner so CI fails on any staged secret.
          args: --pre-commit

  # ---------------------------- b) pip-install ------------------------------
  scan-pip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # so git diff --cached can resolve HEAD~1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install vibe-protect

      # Pre-commit mode walks `git diff --cached` — on PRs we simulate
      # staging by running against the diff between HEAD and its parent.
      - name: Stage the PR diff so --pre-commit can see it
        run: |
          git reset --soft HEAD~1
          git add -A

      - name: Scan
        run: vibe-protect --pre-commit > scan-report.json
        # exit code 1 fails the job when any secret is found — exactly what
        # we want for a CI gate.

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vibe-protect-report
          path: scan-report.json
