name: release-windows

# Builds a signed-style Windows installer whenever you push a tag like v2.0.0
# or manually dispatch the workflow. Attaches VibeProtect-Setup-<version>.exe
# to the GitHub release.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write  # needed to upload to the release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow
          pip install -r desktop/requirements.txt
          pip install -r cli/requirements.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Build installer
        shell: cmd
        run: python installer\build_windows.py

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeProtect-Setup
          path: dist/VibeProtect-Setup-*.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VibeProtect-Setup-*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
