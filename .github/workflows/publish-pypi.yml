name: publish-pypi

# Builds the wheel + sdist on every tag push like ``v1.0.0`` and
# uploads both to PyPI via Trusted Publishing (OIDC) — no API token
# needs to live in GitHub secrets. Configure the trusted publisher at:
#
#   https://pypi.org/manage/account/publishing/
#     package-name: vibe-protect
#     repository:   vibeprotect/vibe-protect
#     workflow:     publish-pypi.yml
#     environment:  pypi
#
# To cut a release:
#
#   echo "1.1.0" > VERSION           # source of truth
#   git commit -am "release: 1.1.0"
#   git tag v1.1.0
#   git push --tags
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Sync pyproject version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          python - <<PY
          import pathlib, re
          p = pathlib.Path("pyproject.toml")
          p.write_text(re.sub(r'version = "[^"]+"', f'version = "$TAG"', p.read_text(), count=1))
          PY
          echo "$TAG" > VERSION

      - name: Build wheel + sdist
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload artifact for debugging
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/vibe-protect
    permissions:
      id-token: write   # Trusted Publishing — no secret token needed
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
