<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vibe Protect</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="dot"></span>
        <span class="name">VIBE PROTECT</span>
        <span class="version">v2.0</span>
      </div>
      <label class="switch" title="Arm / disarm globally">
        <input id="enabled" type="checkbox" />
        <span class="slider"></span>
      </label>
    </header>

    <section class="site">
      <div class="site-row">
        <div>
          <div class="site-label">CURRENT SITE</div>
          <div class="site-host" id="site-host">—</div>
        </div>
        <div class="site-status" id="site-status">
          <span class="status-dot"></span>
          <span class="status-text">checking…</span>
        </div>
      </div>
      <button id="protect-btn" class="protect-btn" hidden>
        ⚠ Protect this site
      </button>

      <div class="scan-row">
        <button id="scan-btn" class="scan-btn" title="Read your current clipboard, redact secrets, and write the cleaned text back">
          ⌫ Scan clipboard now
        </button>
        <span id="scan-status" class="scan-status"></span>
      </div>

      <div class="hint" id="hint">
        Auto-protected: ChatGPT · Claude. Other sites need one click above.
      </div>
    </section>

    <section class="stats">
      <div class="card">
        <div class="label">EVENTS</div>
        <div class="value" id="events-count">0</div>
      </div>
      <div class="card">
        <div class="label">SECRETS CAUGHT</div>
        <div class="value" id="secrets-count">0</div>
      </div>
    </section>

    <section class="feed">
      <div class="feed-label">RECENT</div>
      <ul id="feed"></ul>
    </section>

    <footer>
      <a id="options-link" href="#">Patterns</a>
      <span>·</span>
      <a id="github-link" href="https://github.com" target="_blank" rel="noopener">GitHub</a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
